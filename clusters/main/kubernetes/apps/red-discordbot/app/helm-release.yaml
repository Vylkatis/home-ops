---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: red-discordbot
  namespace: red-discordbot
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: 15.38.0
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
      interval: 15m
  timeout: 20m
  maxHistory: 3
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    TZ: ${TIMEZONE}

    credentials:
      s3:
        type: s3
        url: ${S3_URL}
        bucket: "${S3_BUCKET}-{{ .Release.Name }}"
        accessKey: ${S3_accessKey}
        secretKey: ${S3_secretKey}
        encrKey: ${S3_secretKey}

    image:
      pullPolicy: IfNotPresent
      repository: docker.io/phasecorex/red-discordbot
      tag: full@sha256:85a08e15ec50d2d44f5c34e3f37733ad7f3b035f1a1b555183cae19fcb60f319
    persistence:
      data:
        enabled: true
        mountPath: /data

    securityContext:
      container:
        readOnlyRootFilesystem: false
        runAsGroup: 0
        runAsUser: 0

    workload:
      main:
        podSpec:
          containers:
            main:
              env:
                PREFIX: "?"
                TOKEN: "${TERA_TOKEN}"
            probes:
              liveness:
                enabled: false
              readiness:
                enabled: false
              startup:
                enabled: false

    resources:
      requests:
        cpu: 10m