---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: red-discordbot
  namespace: red-discordbot
spec:
  interval: 15m
  chart:
    spec:
      chart: red-discordbot
      version: 8.17.1
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
      interval: 15m
  timeout: 20m
  maxHistory: 3
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    TZ: ${TIMEZONE}

    Dashboardimage:
      pullPolicy: Always
      repository: docker.io/jzjad/red-dashboard
      tag: latest

    service:
      main:
        enabled: true
        type: LoadBalancer
        externalTrafficPolicy: Local
        integrations:
          metallb:
            enabled: true
        ports:
          main:
            enabled: true
            port: 42356
            protocol: http
            targetPort: 42356

    workload:
      main:
        podSpec:
          containers:
            main:
              env:
                PREFIX: "?"
                TOKEN: "${TERA_TOKEN}"
                EXTRA_ARGS: "--rpc"
              probes:
                liveness:
                  enabled: false
                readiness:
                  enabled: false
                startup:
                  enabled: false
            dashboard:
              enabled: true
              primary: false
              imageSelector: Dashboardimage
              probes:
                liveness:
                  enabled: false
                readiness:
                  enabled: false
                startup:
                  enabled: false

    resources:
      requests:
        cpu: 10m