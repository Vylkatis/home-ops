---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: profilarr
  namespace: profilarr
spec:
  interval: 30m
  chart:
    spec:
      chart: profilarr
      version: 3.3.0
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
      interval: 30m
  timeout: 20m
  maxHistory: 3
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    global:
      stopAll: false

    image:
      repository: ghcr.io/dictionarry-hub/profilarr
      pullPolicy: IfNotPresent
      tag: v2.0.5
    
    ingress:
      main:
        enabled: true
        ingressClassName: "internal"
        hosts:
          - host: profilarr.${DOMAIN_0}
        integrations:
          nginx:
            enabled: true
          certManager:
            enabled: true
            certificateIssuer: domain-0-le-prod

    workload:
      main:
        podSpec:
          containers:
            main:
              env:
                ORIGIN: https://profilarr.${DOMAIN_0}
                AUTH: off

    cnpg:
      main:
        enabled: false