---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: profilarr
  namespace: profilarr
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 18.14.5
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
      interval: 30m
  timeout: 20m
  maxHistory: 3
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    global:
      stopAll: false

    TZ: ${TIMEZONE}

    workload:
      main:
        podSpec:
          containers:
            main:
              env:
                AUTH: off
                ORIGIN: https://profilarr.${DOMAIN_0}

    image:
      repository: ghcr.io/dictionarry-hub/profilarr
      pullPolicy: IfNotPresent
      tag: 2.0.9

    service:
      main:
        ports:
          main:
            protocol: http
            targetPort: 6868
            port: 6868
    
    securityContext:
      container:
        runAsNonRoot: false
        readOnlyRootFilesystem: false
        runAsUser: 0
        runAsGroup: 0

    ingress:
      main:
        enabled: true
        ingressClassName: "internal"
        hosts:
          - host: profilarr.${DOMAIN_0}
            paths:
              - path: /
                pathType: Prefix
        integrations:
          nginx:
            enabled: true
          certManager:
            enabled: true
            certificateIssuer: domain-0-le-prod

    persistence:
      config:
        enabled: true
        mountPath: /config

    cnpg:
      main:
        enabled: false